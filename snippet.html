<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中文人名生成器</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card-hover:#334155;--primary:#38bdf8;--text:#f1f5f9;--text-dim:#94a3b8;--border:#334155;--accent:#f472b6;--accent2:#a78bfa;--radius:12px}
.light{--bg:#f1f5f9;--card:#fff;--card-hover:#f8fafc;--primary:#0284c7;--text:#0f172a;--text-dim:#64748b;--border:#e2e8f0;--accent:#ec4899;--accent2:#7c3aed}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Microsoft YaHei","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:.3s}
.container{max-width:960px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 20px;position:relative}
header h1{font-size:2.2em;background:linear-gradient(135deg,var(--primary),var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
header p{color:var(--text-dim);font-size:.95em}
.theme-btn{position:absolute;top:20px;right:0;background:var(--card);border:1px solid var(--border);color:var(--text);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1.3em;display:flex;align-items:center;justify-content:center;transition:.3s}
.theme-btn:hover{border-color:var(--primary)}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:.3s}
.panel-title{font-size:1.05em;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.option-group label{display:block;font-size:.85em;color:var(--text-dim);margin-bottom:6px}
select,input[type=number]{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.95em;outline:none;transition:.3s}
select:focus,input:focus{border-color:var(--primary)}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:.9em;color:var(--text-dim);cursor:pointer}
.checkbox-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--primary);cursor:pointer}
.generate-btn{display:block;width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--accent2));color:#fff;border:none;border-radius:var(--radius);font-size:1.15em;font-weight:600;cursor:pointer;transition:.3s;margin-bottom:20px}
.generate-btn:hover{opacity:.9}
.generate-btn:active{transform:scale(.98)}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.name-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;text-align:center;cursor:pointer;transition:.3s;position:relative;overflow:hidden}
.name-card:hover{background:var(--card-hover);border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 20px rgba(56,189,248,.15)}
.name-card .name{font-size:1.6em;font-weight:700;letter-spacing:4px;margin-bottom:6px}
.name-card .pinyin{font-size:.82em;color:var(--text-dim);letter-spacing:1px}
.name-card .copied-tip{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(56,189,248,.92);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.95em;opacity:0;transition:.3s;pointer-events:none;border-radius:var(--radius)}
.name-card.copied .copied-tip{opacity:1}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.7em;margin-top:6px}
.tag-m{background:rgba(56,189,248,.2);color:var(--primary)}
.tag-f{background:rgba(244,114,182,.2);color:var(--accent)}
.tag-n{background:rgba(167,139,250,.2);color:var(--accent2)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-state .icon{font-size:3em;margin-bottom:12px}
.stats{display:flex;gap:20px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.stat-item{font-size:.8em;color:var(--text-dim);background:var(--bg);padding:4px 12px;border-radius:20px}
.stat-item strong{color:var(--primary)}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.results-header span{color:var(--text-dim);font-size:.9em}
@media(max-width:600px){header h1{font-size:1.6em}.results-grid{grid-template-columns:repeat(2,1fr)}.options-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <header>
    <button class="theme-btn" onclick="toggleTheme()" title="切换主题">🌓</button>
    <h1>🀄 中文人名生成器</h1>
    <p>涵盖 500+ 姓氏 · 20000+ 汉字 · 无需联网</p>
    <div class="stats">
      <span class="stat-item">姓氏: <strong id="surnameCount">0</strong></span>
      <span class="stat-item">取名用字: <strong id="charCount">0</strong></span>
      <span class="stat-item">可组合: <strong>数亿+</strong></span>
    </div>
  </header>
  <div class="panel">
    <div class="panel-title">⚙️ 生成设置</div>
    <div class="options-grid">
      <div class="option-group">
        <label>性别倾向</label>
        <select id="gender"><option value="any">🎲 随机</option><option value="male">👦 男性</option><option value="female">👧 女性</option><option value="neutral">⚖️ 中性</option></select>
      </div>
      <div class="option-group">
        <label>名字长度</label>
        <select id="nameLen"><option value="random">🎲 随机</option><option value="1">单字名</option><option value="2" selected>双字名</option></select>
      </div>
      <div class="option-group">
        <label>姓氏类型</label>
        <select id="surnameType"><option value="random">🎲 随机</option><option value="single" selected>单姓</option><option value="compound">复姓</option></select>
      </div>
      <div class="option-group">
        <label>取名风格</label>
        <select id="style"><option value="simple">🪨 简单名字</option><option value="elegant">🏯 古风诗意</option><option value="modern">✨ 现代优选</option><option value="full">🌐 全字库随机</option></select>
      </div>
      <div class="option-group">
        <label>生成数量</label>
        <input type="number" id="count" value="12" min="1" max="50">
      </div>
    </div>
    <label class="checkbox-row"><input type="checkbox" id="commonSurname" checked> 仅使用常见姓氏（前120个）</label>
  </div>
  <button class="generate-btn" onclick="generate()">✨ 生成名字</button>
  <div id="resultsArea">
    <div class="empty-state"><div class="icon">📝</div><p>点击上方按钮生成名字</p><p style="font-size:.85em;margin-top:4px">点击名字卡片可复制</p></div>
  </div>
</div>

pd.split(',').forEach(item=>{
  // 找到第一个拉丁字母位置
  let idx=-1;
  for(let i=0;i<item.length;i++){
    if(item.charCodeAt(i)<0x2000){idx=i;break;}
  }
  if(idx>0){
    pinyinMap[item.substring(0,idx)]=item.substring(idx);
  }
});

function getPinyin(char){
  return pinyinMap[char]||'·';
}
function getFullPinyin(name){
  return [...name].map(c=>getPinyin(c)).join(' ');
}

// ===== 工具函数 =====
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pickN(arr,n){ let r=[]; for(let i=0;i<n;i++) r.push(pick(arr)); return r; }

// ===== 获取字池 =====
function getCharPool(gender, style){
  if(style==='simple'){
    let pool=[...simpleSingleChars,...simpleFirstChars,...simpleSecondChars];
    if(gender==='male') pool=[...pool,...maleChars];
    else if(gender==='female') pool=[...pool,...femaleChars];
    else if(gender==='neutral') pool=[...pool,...neutralChars];
    else pool=[...pool,...maleChars,...femaleChars,...neutralChars];
    return [...new Set(pool.filter(c=>c.length===1))];
  }
  if(style==='full') return fullCJK;
  let pool=[];
  if(style==='elegant') pool=[...elegantChars,...neutralChars];
  else pool=[...modernChars,...neutralChars];

  if(gender==='male') pool=[...pool,...maleChars];
  else if(gender==='female') pool=[...pool,...femaleChars];
  else if(gender==='neutral') pool=[...pool,...neutralChars];
  else pool=[...pool,...maleChars,...femaleChars,...neutralChars];

  return [...new Set(pool)];
}

function generateSimpleGivenName(gender, len){
  if(len===1) return pick(simpleSingleChars);

  let pairPool=[...simpleNeutralPairs];
  if(gender==='male') pairPool=[...pairPool,...simpleMaleChars];
  else if(gender==='female') pairPool=[...pairPool,...simpleFemaleChars];
  else if(gender==='neutral') pairPool=[...pairPool,...simpleNeutralPairs];
  else pairPool=[...pairPool,...simpleMaleChars,...simpleFemaleChars];

  if(Math.random()<0.72) return pick(pairPool);

  let first=pick(simpleFirstChars);
  let second=pick(simpleSecondChars);
  let safety=0;
  while(first===second && safety<6){
    second=pick(simpleSecondChars);
    safety++;
  }
  return first+second;
}

// ===== 主生成 =====
function generate(){
  const gender=document.getElementById('gender').value;
  const nameLenOpt=document.getElementById('nameLen').value;
  const surnameType=document.getElementById('surnameType').value;
  const style=document.getElementById('style').value;
  const count=Math.min(50,Math.max(1,parseInt(document.getElementById('count').value)||12));
  const onlyCommon=document.getElementById('commonSurname').checked;

  let surnamePool=onlyCommon?commonSurnames:allSurnameList;
  if(surnameType==='single') surnamePool=onlyCommon?commonSurnames:[...new Set([...commonSurnames,...moreSurnames])];
  else if(surnameType==='compound') surnamePool=compoundSurnames;
  const charPool=getCharPool(gender,style);
  const genderTag=gender==='male'?'男':gender==='female'?'女':gender==='neutral'?'中性':'';

  const results=[];
  for(let i=0;i<count;i++){
    const surname=pick(surnamePool);
    let len=nameLenOpt==='random'?(Math.random()>0.3?2:1):parseInt(nameLenOpt);
    let givenName='';
    if(style==='simple') givenName=generateSimpleGivenName(gender,len);
    else for(let j=0;j<len;j++) givenName+=pick(charPool);
    results.push({full:surname+givenName, surname, givenName, gender:genderTag});
  }

  renderResults(results);
}

function renderResults(results){
  const area=document.getElementById('resultsArea');
  let html=`<div class="results-header"><div class="panel-title">📋 生成结果</div><span>点击卡片复制 · 共 ${results.length} 个</span></div><div class="results-grid">`;
  results.forEach((r,i)=>{
    const pinyin=getFullPinyin(r.full);
    const tagClass=r.gender==='男'?'tag-m':r.gender==='女'?'tag-f':'tag-n';
    const tagText=r.gender||'随机';
    html+=`<div class="name-card" onclick="copyName(this,'${r.full}')">
      <div class="name">${r.full}</div>
      <div class="pinyin">${pinyin}</div>
      <span class="tag ${tagClass}">${tagText}</span>
      <div class="copied-tip">✅ 已复制</div>
    </div>`;
  });
  html+='</div>';
  area.innerHTML=html;
}

function copyName(el, name){
  navigator.clipboard.writeText(name).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=name; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
  el.classList.add('copied');
  setTimeout(()=>el.classList.remove('copied'),800);
}

// ===== 主题 =====
function toggleTheme(){
  document.body.classList.toggle('light');
}

// ===== 初始化统计 =====
document.getElementById('surnameCount').textContent=allSurnameList.length;
document.getElementById('charCount').textContent=fullCJK.length;

// 回车也能生成
document.addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
